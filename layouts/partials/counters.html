{{ if .IsPage }}
<div class="counters" data-slug="{{ .File.ContentBaseName | urlize }}">
  <span class="views">👀 本頁瀏覽量 <span id="views-count">0</span> 次</span>
  <button class="like-btn" aria-label="噴兔子">
    <img src="/images/mao_6.webm" class="like-icon" alt="讚">
    <span id="likes-count">0</span>
  </button>
</div>
{{ end }}

<style>
  .counters {
    position: relative;
    overflow: visible;
  }

  .views {
    color: #666;
    font-size: 0.7rem;
  }

  #views-count, #likes-count {
    font-weight: bold;
    color: #333;
    font-size: 0.7rem;
  }

  .like-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    font-size: 0.7rem;   /* 數字大小 */
    line-height: 0;
    vertical-align: 0.1em;
  }

  /* 關鍵：單獨控制 emoji 大小 */
  .like-icon {
    width: 2.75em;    /* ← 調整大小 */
    height: 2.5rem;

    vertical-align: middle;
  }

  /* 飛出的兔子 */
  .rabbit {
  position: absolute;
  width: 4rem;
  height: 4rem;
  pointer-events: none;
  z-index: 10000;
  line-height: 1;
  animation: burst 2.1s cubic-bezier(0.1, 0.1, 0.1, 0.2) forwards;  
  /* 改用更陡的曲線：前段極快衝刺，後段平穩飛遠 */
  opacity: 0;
}

@keyframes burst {
  0%   { transform: translate(0, 0) scale(1.0); opacity: 1; }
  60%  { opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(1.7); opacity: 0; }
}
</style>
