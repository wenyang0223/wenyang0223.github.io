name: Check Dead Links

on:
  schedule:
    - cron: '0 2 * * 1'  # 每週一凌晨 2 點（UTC）
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --format markdown
            --exclude "localhost|127\.0\.0\.1|^#|^mailto:|^tel:|//twitter\.com|//x\.com|cdn\.jsdelivr\.net"
            --max-requests 30
            --timeout 20
            './public'
          fail: false
          jobSummary: true

      - name: Create Issue with broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: '🔗 Dead links found - Run #${{ github.run_number }}'
          content-filepath: ./lychee/out.md
          labels: bug, automation, links
          assignees: wenyang0223