name: Discord Notification
on:
  push:
    branches:
      - main
    paths:
      - 'content/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get latest post info
        id: post_info
        run: |
          # 1. 取得變動的文章檔案路徑
          FILEPATH=$(git diff --name-only HEAD^ HEAD | grep "content/.*\.md$" | head -n 1)
          
          if [ -z "$FILEPATH" ]; then
            echo "沒有偵測到新文章內容，跳過通知。"
            exit 0
          fi

          # 2. 抓取標題
          TITLE=$(grep -m 1 "title:" "$FILEPATH" | sed 's/title: //g' | tr -d '"' | tr -d "'" | xargs)
          
          # 3. 抓取 Slug
          SLUG=$(basename "$FILEPATH" .md)

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Send Webhook to Discord
        if: steps.post_info.outputs.slug != ''
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "✨ 聆聽的河流有新文章了！",
              "description": "📝 **標題：'"${{ steps.post_info.outputs.title }}"'**\n\n新的文字已經緩緩流入網站，歡迎點擊閱讀。",
              "url": "https://wenyang.vercel.app/blog/'"${{ steps.post_info.outputs.slug }}"'/",
              "color": 3447003,
              "footer": {
                "text": "來自 GitHub Actions 的自動通知"
              },
              "timestamp": "'"$TIMESTAMP"'"
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}